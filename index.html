<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>URP Solutions — Ethical Recruitment Governance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy-950: oklch(12% 0.035 248);
    --navy-900: oklch(16% 0.038 248);
    --navy-800: oklch(20% 0.042 248);
    --navy-700: oklch(26% 0.045 248);
    --navy-600: oklch(33% 0.045 248);
    --navy-500: oklch(42% 0.04 248);
    --gold: #fedb28;
    --gold-dim: #da6227;
    --gold-pale: #fff3a3;
    --teal: #2f6171;
    --teal-light: #3d7a8a;
    --mint: #8ecfbf;
    --orange: #da6227;
    --text: oklch(97% 0.005 248);
    --text-muted: oklch(80% 0.015 248);
    --text-dim: oklch(65% 0.02 248);
    --border: oklch(28% 0.04 248);
    --border-subtle: oklch(22% 0.038 248);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--navy-950);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Playfair Display', serif; }
  ::selection { background: var(--gold); color: var(--navy-950); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy-900); }
  ::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 3px; }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    background: var(--navy-800); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; width: 240px;
    box-shadow: 0 8px 40px oklch(0% 0 0 / 0.5);
    display: none;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h4 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .tweak-row select, .tweak-row input[type=range] { width: 100%; background: var(--navy-700); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <label>Type Scale</label>
    <select id="tweak-scale">
      <option value="1">Standard</option>
      <option value="1.08">Larger</option>
      <option value="0.92">Compact</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Gold Intensity</label>
    <input type="range" id="tweak-gold" min="0.06" max="0.22" step="0.01" value="0.14" />
  </div>
  <div class="tweak-row">
    <label>Section Density</label>
    <select id="tweak-density">
      <option value="spacious">Spacious</option>
      <option value="standard" selected>Standard</option>
      <option value="compact">Compact</option>
    </select>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── TWEAK DEFAULTS ─────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "scale": "1",
  "goldChroma": "0.22",
  "density": "standard"
}/*EDITMODE-END*/;

/* ─── CONSTANTS ─────────────────────── */
const NAV_LINKS = ['Home', 'About', 'Solutions', 'Technology', 'Contact'];
const DENSITY = { spacious: '140px', standard: '100px', compact: '64px' };

/* ─── ICONS (minimal SVG) ────────────── */
const Icon = ({ name, size = 20 }) => {
  const icons = {
    arrow: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M4 10l4 4 8-8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    globe: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.5" stroke="currentColor" strokeWidth="1.2"/><path d="M10 2.5C10 2.5 13 6 13 10s-3 7.5-3 7.5M10 2.5C10 2.5 7 6 7 10s3 7.5 3 7.5M2.5 10h15" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="8" rx="1.5" stroke="currentColor" strokeWidth="1.2"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>,
    cpu: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><rect x="5" y="5" width="10" height="10" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M8 5V3m4 2V3M8 17v-2m4 2v-2M5 8H3m2 4H3m14-4h-2m2 4h-2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>,
    shield: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M10 2L4 5v5.5C4 14 7 17.5 10 18.5c3-1 6-4.5 6-8V5l-6-3z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg>,
    layers: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M10 2l8 4-8 4-8-4 8-4zM2 10l8 4 8-4M2 14l8 4 8-4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    eye: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" strokeWidth="1.2"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" strokeWidth="1.2"/></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.2"/><path d="M3 6l7 5 7-5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>,
  };
  return icons[name] || null;
};

/* ─── LAYOUT COMPONENTS ──────────────── */
const GoldRule = ({ width = '48px' }) => (
  <div style={{ width, height: '2px', background: 'var(--gold)', marginBottom: '24px' }} />
);

const SectionLabel = ({ children }) => (
  <div style={{ fontSize: '11px', letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--gold)', fontWeight: 500, marginBottom: '12px' }}>
    {children}
  </div>
);

const Btn = ({ children, variant = 'primary', onClick, style = {} }) => {
  const base = { display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '13px 28px', borderRadius: '3px', fontSize: '13px', fontFamily: 'DM Sans, sans-serif', fontWeight: 500, letterSpacing: '0.04em', cursor: 'pointer', transition: 'all 0.2s', border: 'none', ...style };
  const variants = {
    primary: { background: 'var(--gold)', color: 'var(--navy-950)' },
    ghost: { background: 'transparent', color: 'var(--text)', border: '1px solid var(--border)' },
    outline: { background: 'transparent', color: 'var(--gold)', border: '1px solid var(--gold)' },
  };
  const [hovered, setHovered] = useState(false);
  const hoverMap = {
    primary: { background: 'var(--gold-pale)', transform: 'translateY(-1px)' },
    ghost: { borderColor: 'var(--text-muted)', transform: 'translateY(-1px)' },
    outline: { background: 'rgba(254, 219, 40, 0.1)', transform: 'translateY(-1px)' },
  };
  return (
    <button
      style={{ ...base, ...variants[variant], ...(hovered ? hoverMap[variant] : {}) }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      onClick={onClick}
    >
      {children}
    </button>
  );
};

/* ─── NAVIGATION ─────────────────────── */
const Nav = ({ page, setPage }) => {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
    padding: '0 48px',
    background: scrolled ? 'oklch(12% 0.035 248 / 0.97)' : 'transparent',
    backdropFilter: scrolled ? 'blur(12px)' : 'none',
    borderBottom: scrolled ? '1px solid var(--border-subtle)' : '1px solid transparent',
    transition: 'all 0.3s',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    height: '72px',
  };

  return (
    <nav style={navStyle}>
      {/* Logo */}
      <div
        style={{ cursor: 'pointer' }}
        onClick={() => { setPage('Home'); window.scrollTo(0,0); }}
      >
        <img src="uploads/URP_logo.png" alt="URP Solutions" style={{ height: '48px', display: 'block', borderRadius: '4px' }} />
      </div>

      {/* Desktop Links */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '36px' }}>
        {NAV_LINKS.filter(l => l !== 'Contact').map(l => (
          <button
            key={l}
            onClick={() => { setPage(l); window.scrollTo(0,0); }}
            style={{
              background: 'none', border: 'none', cursor: 'pointer',
              fontSize: '13px', letterSpacing: '0.05em', fontFamily: 'DM Sans, sans-serif',
              color: page === l ? 'var(--gold)' : 'var(--text-muted)',
              borderBottom: page === l ? '1px solid var(--gold)' : '1px solid transparent',
              paddingBottom: '2px', transition: 'all 0.2s',
            }}
          >
            {l}
          </button>
        ))}
        <Btn variant="outline" onClick={() => { setPage('Contact'); window.scrollTo(0,0); }} style={{ padding: '8px 20px', fontSize: '12px' }}>
          Contact
        </Btn>
      </div>
    </nav>
  );
};

/* ─── HOME PAGE ──────────────────────── */
const Home = ({ setPage }) => {
  return (
    <div>
      {/* HERO */}
      <section style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', position: 'relative', padding: '120px 48px 80px', overflow: 'hidden' }}>
        {/* Background geometry */}
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
          <div style={{ position: 'absolute', right: '-10%', top: '10%', width: '600px', height: '600px', border: '1px solid oklch(28% 0.04 248)', borderRadius: '50%', opacity: 0.4 }} />
          <div style={{ position: 'absolute', right: '-5%', top: '15%', width: '400px', height: '400px', border: '1px solid oklch(28% 0.04 248)', borderRadius: '50%', opacity: 0.3 }} />
          <div style={{ position: 'absolute', right: '5%', top: '22%', width: '200px', height: '200px', border: '1px solid var(--gold)', borderRadius: '50%', opacity: 0.15 }} />
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '1px', background: 'linear-gradient(90deg, transparent, var(--gold), transparent)', opacity: 0.3 }} />
        </div>

        <div style={{ maxWidth: '800px', position: 'relative' }}>
          <SectionLabel>Global Ethical Recruitment Standard</SectionLabel>
          <h1 className="serif" style={{ fontSize: 'clamp(38px, 5vw, 64px)', lineHeight: 1.12, fontWeight: 600, marginBottom: '28px', letterSpacing: '-0.01em', textWrap: 'pretty' }}>
            Designing the Global Standard<br />
            <span style={{ color: 'var(--gold)' }}>for Ethical Foreign Worker</span><br />
            Recruitment
          </h1>
          <p style={{ fontSize: '18px', color: 'var(--text-muted)', maxWidth: '580px', lineHeight: 1.7, marginBottom: '12px' }}>
            A fully integrated governance and execution ecosystem eliminating exploitation, ensuring compliance, and restoring trust in global labour mobility.
          </p>
          <p style={{ fontSize: '13px', color: 'var(--text-dim)', letterSpacing: '0.03em', marginBottom: '44px' }}>
            Powered by the proven digital infrastructure of Bestinet Sdn. Bhd.
          </p>
          <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
            <Btn onClick={() => { setPage('Solutions'); window.scrollTo(0,0); }}>
              Explore Solutions <Icon name="arrow" size={16} />
            </Btn>
            <Btn variant="ghost" onClick={() => { setPage('Contact'); window.scrollTo(0,0); }}>
              Request Strategic Briefing
            </Btn>
          </div>

          {/* Stats bar */}
          <div style={{ marginTop: '80px', display: 'flex', gap: '48px', paddingTop: '40px', borderTop: '1px solid var(--border-subtle)' }}>
            {[
              { val: '20+', label: 'Countries Served', color: 'var(--gold)' },
              { val: '5M+', label: 'Workers Processed', color: 'var(--orange)' },
              { val: '100%', label: 'Employer Pays', color: 'var(--mint)' },
            ].map(s => (
              <div key={s.label}>
                <div className="serif" style={{ fontSize: '32px', fontWeight: 600, color: s.color, lineHeight: 1 }}>{s.val}</div>
                <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginTop: '6px', letterSpacing: '0.04em' }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* THE GLOBAL CRISIS */}
      <section style={{ padding: '100px 48px', background: 'var(--navy-900)' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <SectionLabel>The Challenge</SectionLabel>
          <GoldRule />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '80px', alignItems: 'start' }}>
            <div>
              <h2 className="serif" style={{ fontSize: '40px', fontWeight: 600, lineHeight: 1.2, marginBottom: '24px' }}>A System Under Strain</h2>
              <p style={{ color: 'var(--text-muted)', lineHeight: 1.8, fontSize: '16px' }}>
                The global migrant recruitment ecosystem is structurally broken. Fragmented processes, opaque intermediaries, and unregulated fee structures continue to expose workers, employers, and governments to systemic risk.
              </p>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px' }}>
              {[
                { icon: 'layers', label: 'Fragmented cross-border systems', desc: 'Disconnected national registries with no unified oversight', color: 'var(--gold)' },
                { icon: 'lock', label: 'Unregulated recruitment fees', desc: 'Workers pay excessive fees with no accountability', color: 'var(--orange)' },
                { icon: 'globe', label: 'Informal agent networks', desc: 'Unlicensed brokers operating outside legal frameworks', color: 'var(--teal-light)' },
                { icon: 'eye', label: 'Zero end-to-end transparency', desc: 'No auditable record across the recruitment lifecycle', color: 'var(--mint)' },
              ].map(item => (
                <div key={item.label} style={{ background: 'var(--navy-800)', padding: '28px', borderBottom: '2px solid transparent', transition: 'border-color 0.2s' }}
                  onMouseEnter={e => e.currentTarget.style.borderBottomColor = item.color}
                  onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
                >
                  <div style={{ color: item.color, marginBottom: '12px' }}><Icon name={item.icon} size={22} /></div>
                  <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '8px', letterSpacing: '0.02em' }}>{item.label}</div>
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', lineHeight: 1.6 }}>{item.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* THE URP RESPONSE */}
      <section style={{ padding: '100px 48px' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <SectionLabel>Our Response</SectionLabel>
          <GoldRule />
          <h2 className="serif" style={{ fontSize: '40px', fontWeight: 600, marginBottom: '16px' }}>A System-Level Intervention</h2>
          <p style={{ color: 'var(--text-muted)', maxWidth: '560px', lineHeight: 1.8, marginBottom: '60px' }}>
            URP Solutions introduces a paradigm shift — transitioning recruitment from an agent-driven ecosystem to a fully governed, system-driven infrastructure.
          </p>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px' }}>
            {[
              {
                tag: 'TURAP', full: 'Governance Layer', color: 'var(--gold)',
                items: ['Policy enforcement & compliance standards', 'National-level oversight framework', 'Regulatory reporting & accountability', 'International alignment & ESG governance'],
                bg: 'var(--navy-800)',
              },
              {
                tag: 'URP', full: 'Execution Layer', color: 'var(--orange)',
                items: ['End-to-end worker sourcing & processing', 'Verification, digital contracts & onboarding', 'Cross-border coordination & logistics', 'Employer engagement & compliance support'],
                bg: 'var(--navy-700)',
              },
            ].map(l => (
              <div key={l.tag} style={{ background: l.bg, padding: '48px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '28px' }}>
                  <div style={{ fontSize: '28px', fontWeight: 700, color: l.color, fontFamily: 'Playfair Display, serif' }}>{l.tag}</div>
                  <div style={{ width: '1px', height: '24px', background: 'var(--border)' }} />
                  <div style={{ fontSize: '12px', color: 'var(--text-dim)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{l.full}</div>
                </div>
                <ul style={{ listStyle: 'none' }}>
                  {l.items.map(i => (
                    <li key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', padding: '10px 0', borderBottom: '1px solid var(--border-subtle)', fontSize: '14px', color: 'var(--text-muted)' }}>
                      <span style={{ color: 'var(--gold)', marginTop: '2px', flexShrink: 0 }}><Icon name="check" size={14} /></span>
                      {i}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* WHY IT MATTERS NOW */}
      <section style={{ padding: '100px 48px', background: 'var(--navy-900)' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <SectionLabel>Urgency</SectionLabel>
          <GoldRule />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.5fr', gap: '80px', alignItems: 'center' }}>
            <div>
              <h2 className="serif" style={{ fontSize: '40px', fontWeight: 600, lineHeight: 1.2, marginBottom: '24px' }}>Urgency at a Global Scale</h2>
              <p style={{ color: 'var(--text-muted)', lineHeight: 1.8 }}>
                Rising regulatory scrutiny, ESG mandates, and global enforcement mechanisms have made ethical recruitment a non-negotiable requirement.
              </p>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
              {[
                { label: 'TIP Rankings', desc: 'Trafficking in Persons rankings directly impact national trade relationships and diplomatic standing.' },
                { label: 'Forced Labour Trade Exposure', desc: 'Multinational companies face import bans and supply chain exclusions under new forced labour legislation.' },
                { label: 'Multinational Compliance Mandates', desc: 'Global corporations now require auditable, ESG-compliant recruitment from all supply chain partners.' },
              ].map((item, i) => (
                <div key={item.label} style={{ display: 'flex', gap: '24px', padding: '28px 32px', background: 'var(--navy-800)', alignItems: 'flex-start' }}>
                  <div className="serif" style={{ fontSize: '36px', color: 'var(--gold)', fontWeight: 600, opacity: 0.4, lineHeight: 1, minWidth: '40px' }}>
                    {String(i + 1).padStart(2, '0')}
                  </div>
                  <div>
                    <div style={{ fontWeight: 600, marginBottom: '6px', letterSpacing: '0.02em' }}>{item.label}</div>
                    <div style={{ fontSize: '14px', color: 'var(--text-muted)', lineHeight: 1.7 }}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* DIFFERENTIATION */}
      <section style={{ padding: '100px 48px' }}>
        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
          <SectionLabel>Differentiation</SectionLabel>
          <GoldRule />
          <h2 className="serif" style={{ fontSize: '40px', fontWeight: 600, marginBottom: '56px' }}>What Sets URP Apart</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '2px' }}>
            {[
              { icon: 'layers', title: 'End-to-End Lifecycle Control', desc: 'From quota approval to worker integration — every step governed and auditable.', color: 'var(--gold)' },
              { icon: 'lock', title: 'Escrow-Based Financial Governance', desc: 'Payments released only upon verified compliance milestones. Zero cash leakage.', color: 'var(--orange)' },
              { icon: 'shield', title: 'Physical Enforcement via GEFC', desc: 'Biometric enrollment centers ensure coercion-free, verified worker processing.', color: 'var(--teal-light)' },
              { icon: 'cpu', title: 'Real-Time Government Integration', desc: 'Direct API-level interoperability with national immigration and labour systems.', color: 'var(--mint)' },
            ].map(p => (
              <div key={p.title}
                style={{ padding: '40px 28px', background: 'var(--navy-800)', borderTop: `2px solid var(--border)`, cursor: 'default', transition: 'border-color 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.borderTopColor = p.color}
                onMouseLeave={e => e.currentTarget.style.borderTopColor = 'var(--border)'}
              >
                <div style={{ width: '44px', height: '44px', border: `1px solid ${p.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '24px', color: p.color }}>
                  <Icon name={p.icon} size={20} />
                </div>
                <h3 style={{ fontSize: '15px', fontWeight: 600, marginBottom: '12px', lineHeight: 1.4 }}>{p.title}</h3>

/* ─── APP ────────────────────────────── */
const App = () => {
  const [page, setPage] = useState(() => {
    return localStorage.getItem('urp_page') || 'Home';
  });

  useEffect(() => {
    localStorage.setItem('urp_page', page);
  }, [page]);

  // Tweaks
  useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    const scaleEl = document.getElementById('tweak-scale');
    const goldEl = document.getElementById('tweak-gold');
    const densityEl = document.getElementById('tweak-density');

    const apply = () => {
      const scale = parseFloat(scaleEl.value);
      document.documentElement.style.fontSize = (16 * scale) + 'px';
      const chroma = goldEl.value;
      document.documentElement.style.setProperty('--gold', `oklch(72% ${chroma} 78)`);
      document.documentElement.style.setProperty('--gold-pale', `oklch(82% ${parseFloat(chroma)*0.6} 78)`);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { scale: scaleEl.value, goldChroma: chroma, density: densityEl.value } }, '*');
    };

    scaleEl.addEventListener('change', apply);
    goldEl.addEventListener('input', apply);
    densityEl.addEventListener('change', apply);

    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('open');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const pages = { Home, About, Solutions, Technology, Contact };
  const PageComponent = pages[page];

  return (
    <>
      <Nav page={page} setPage={setPage} />
      <main>
        <PageComponent setPage={setPage} />
      </main>
      <Footer setPage={setPage} />
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
